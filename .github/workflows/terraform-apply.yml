name: Terraform Apply

on:
  push:
    branches:
      - master
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - ".github/workflows/terraform-plan.yml"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch:
    inputs:
      target:
        description: "Stack to apply"
        required: true
        default: all
        type: choice
        options:
          - all
          - dev
          - dev-addons

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: true

concurrency:
  group: terraform-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply_dev:
    name: Apply dev (core)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'dev'

    defaults:
      run:
        shell: bash
        working-directory: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Write tfvars from secret
        run: |
          printf '%s\n' "${{ secrets.TFVARS_DEV }}" > ci.auto.tfvars

      - name: Terraform Init (GCS backend)
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/dev"

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -var-file=ci.auto.tfvars

  apply_dev_addons:
    name: Apply dev (addons)
    runs-on: ubuntu-latest
    needs: [apply_dev]
    if: |
      always() &&
      (github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'dev-addons') &&
      (needs.apply_dev.result == 'success' || needs.apply_dev.result == 'skipped')

    defaults:
      run:
        shell: bash
        working-directory: dev-addons

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup kubectl auth plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Enable GKE auth plugin
        run: echo "USE_GKE_GCLOUD_AUTH_PLUGIN=True" >> "$GITHUB_ENV"

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials "${{ vars.GKE_DEV_CLUSTER_NAME }}" \
            --zone "${{ vars.GKE_DEV_CLUSTER_LOCATION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}"

      - name: Verify kubectl context
        run: kubectl config current-context

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Write tfvars from secret
        run: |
          printf '%s\n' "${{ secrets.TFVARS_DEV_ADDONS }}" > ci.auto.tfvars

      - name: Terraform Init (GCS backend)
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/dev-addons"

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve -var-file=ci.auto.tfvars
