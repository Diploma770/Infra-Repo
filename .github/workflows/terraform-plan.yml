name: Terraform Plan

on:
  pull_request:
    branches:
      - master
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - ".github/workflows/terraform-plan.yml"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_IN_AUTOMATION: true

jobs:
  plan:
    name: Plan (${{ matrix.stack }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: dev
            working_dir: dev
            tfvars_secret: TFVARS_DEV
            state_prefix: terraform/dev
          - stack: dev-addons
            working_dir: dev-addons
            tfvars_secret: TFVARS_DEV_ADDONS
            state_prefix: terraform/dev-addons

    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.working_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Write tfvars from secret
        run: |
          SECRET=""
          case "${{ matrix.tfvars_secret }}" in
            TFVARS_DEV) SECRET='${{ secrets.TFVARS_DEV }}' ;;
            TFVARS_DEV_ADDONS) SECRET='${{ secrets.TFVARS_DEV_ADDONS }}' ;;
          esac

          # Normalize line endings (remove CR), then replace smart quotes with ASCII quotes
          printf '%s' "$SECRET" \
            | tr -d '\r' \
            | sed -e 's/[“”]/"/g' -e "s/[‘’]/'/g" \
            > ci.auto.tfvars

          # Optional: fail fast if file still contains smart quotes
          if grep -nP '[\x{201C}\x{201D}\x{2018}\x{2019}]' ci.auto.tfvars; then
            echo "Found smart quotes in tfvars. Replace them with normal ASCII quotes."
            exit 1
          fi

      - name: Terraform Fmt Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (GCS backend)
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=${{ matrix.state_prefix }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -input=false -no-color -var-file=ci.auto.tfvars > plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tf-plan-${{ matrix.stack }}
          path: ${{ matrix.working_dir }}/plan.txt

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planPath = `${process.env.GITHUB_WORKSPACE}/${{ toJson(matrix.working_dir) }}/plan.txt`;
            const fullPlan = fs.readFileSync(planPath, 'utf8');
            const maxLen = 60000;
            const renderedPlan = fullPlan.length > maxLen
              ? fullPlan.slice(0, maxLen) + '\n\n...truncated...'
              : fullPlan;

            const marker = `<!-- tf-plan:${{ matrix.stack }} -->`;
            const body = `${marker}\n## Terraform Plan: ${{ matrix.stack }}\n\n<details><summary>Show plan</summary>\n\n\`\`\`terraform\n${renderedPlan}\n\`\`\`\n\n</details>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
