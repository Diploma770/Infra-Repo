name: Terraform Plan

on:
  pull_request:
    branches:
      - master
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - ".github/workflows/terraform-plan.yml"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_IN_AUTOMATION: true

jobs:
  plan:
    name: Plan (${{ matrix.stack }})
    runs-on: ubuntu-latest
    env:
      TF_VAR_billing_account_id: ${{ secrets.BILLING_ACCOUNT_ID }}
      TF_VAR_terraform_github_principal: ${{ secrets.TERRAFORM_GITHUB_PRINCIPAL }}
      TF_VAR_cicd_github_principal: ${{ secrets.CICD_GITHUB_PRINCIPAL }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
      TF_VAR_smtp_app_password: ${{ secrets.SMTP_APP_PASSWORD }}
      TF_VAR_argocd_repo_ssh_private_key: ${{ secrets.ARGOCD_REPO_SSH_PRIVATE_KEY }}
      TF_VAR_argocd_repo_password: ${{ secrets.ARGOCD_REPO_PASSWORD }}
      TF_VAR_argocd_repo_username: ${{ secrets.ARGOCD_REPO_USERNAME }}

      
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: dev
            working_dir: dev
            state_prefix: terraform/dev
          - stack: dev-addons
            working_dir: dev-addons
            state_prefix: terraform/dev-addons

    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.working_dir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Fmt Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (GCS backend)
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=${{ matrix.state_prefix }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -input=false -no-color > plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tf-plan-${{ matrix.stack }}
          path: ${{ matrix.working_dir }}/plan.txt

          
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const planPath = `${process.env.GITHUB_WORKSPACE}/${{ matrix.working_dir }}/plan.txt`;
            const fullPlan = fs.readFileSync(planPath, 'utf8');

            const maxLen = 60000;
            const renderedPlan = fullPlan.length > maxLen
              ? fullPlan.slice(0, maxLen) + '\n\n...truncated...'
              : fullPlan;

            const marker = `<!-- tf-plan:${{ matrix.stack }} -->`;
            const body = `${marker}\n## Terraform Plan: ${{ matrix.stack }}\n\n<details><summary>Show plan</summary>\n\n\`\`\`terraform\n${renderedPlan}\n\`\`\`\n\n</details>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
